<!-- The Win95 Dialog Window -->
<div id="new-game-modal" class="modal hidden">
    <div class="win-dialog" style="width: 450px;">
        <!-- Title Bar -->
        <div class="win-title-bar">
            <span>{{ m.new_game or 'New Game' }}</span>
            <button class="win-close" onclick="closeNewGame()">✕</button>
        </div>

        <div class="win-body">
            <!-- Map Settings -->
            <fieldset class="win-fieldset">
                <legend>Map Configuration</legend>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <label>X: <input type="number" id="setup-x" class="win-inset" style="width: 50px;" value="10"></label>
                    <label>Y: <input type="number" id="setup-y" class="win-inset" style="width: 50px;" value="11"></label>
                    <label>File: 
                        <select id="setup-map-file" class="win-inset">
                            <option value="Random">Random</option>
                            {% for map in game.map_list %}
                            <option value="{{ map }}">{{ map }}</option>
                            {% endfor %}
                        </select>
                    </label>
                </div>
            </fieldset>

            <!-- Player Table (Port of Aliigra check boxes) -->
            <table class="win-table" style="width: 100%; margin-top: 10px;">
                <thead>
                    <tr>
                        <th>Play?</th>
                        <th>CPU?</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody id="player-setup-rows">
                    {% for i in range(1, 8) %}
                    <tr>
                        <td><input type="checkbox" id="p{{i}}-active" {{ 'checked' if i <= 2 }}></td>
                        <td><input type="checkbox" id="p{{i}}-is-pc"></td>
                        <td><input type="text" id="p{{i}}-name" class="win-inset" placeholder="Player {{i}}" value="Player {{i}}"></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Buttons -->
        <div class="win-buttons">
            <button class="win-btn default" onclick="submitNewGame()">OK</button>
            <button class="win-btn" onclick="closeNewGame()">Cancel</button>
        </div>
    </div>
</div>

<style>
/* CSS to make it look like a floating dialog */
.modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
}
.win-fieldset {
    border: 2px solid var(--win-white);
    border-right-color: var(--win-dark-gray);
    border-bottom-color: var(--win-dark-gray);
    padding: 10px; margin-bottom: 10px;
}
</style>
