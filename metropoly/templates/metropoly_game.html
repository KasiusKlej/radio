<!DOCTYPE html>
<html lang="{{ session.get('lang', 'sl') }}">
<head>
    <meta charset="utf-8">
    <title>{{ m.app_title or 'Metropoly' }}</title>
    <link rel="stylesheet" href="{{ url_for('metropoly.static', filename='metropoly.css') }}">
</head>

<body class="win95-theme metropoly-mode">

<div id="menu-bar">
    {% include "metropoly_menu.html" %}
</div>

<!-- 4. MAP EDITOR (frmMapEditor) -->
<div id="map-editor-modal" class="modal hidden">
    <!-- Sidebar or floating window for Editor tools -->
    {% include "metropoly_editor_tools.html" %}

    <!-- 5. OPEN / SAVE DIALOG -->
    {% include "game_open_save.html" %}

    <!-- 3. NEW GAME (newgame.frm) -->
    {% include "metropoly_newgame.html" %}

</div>

<div id="metropoly-main-layout">
    
    <!-- LEFT SIDEBAR: Equivalent to VB FrameStatus / PictureStatus -->
    <aside id="sidebar" class="win95-bevel-out">
        
        <!-- Player Assets Section -->
        <div class="sidebar-section win-inset">
            <div id="player-list">
                <!-- JS loops through players and adds name + Gauges (GAUG0-9.png) -->
            </div>
        </div>

        <!-- Land Info Section: Equivalent to VB ImageLandInfo -->
        <div id="land-info-panel" class="sidebar-section win-inset hidden">
            <div class="land-header">
                <img id="land-info-img" src="" alt="Land Type">
                <span id="land-name"></span>
            </div>
            <div id="land-stats" class="stats-text"></div>
        </div>

        <!-- Dice & Status Area -->
        <div class="sidebar-section status-area win-inset">
            <div id="dice-container">
                <!-- Dice images (dice1.png, etc.) injected here -->
            </div>
            <div id="status-label" class="vb-label">{{ m.msg_turn or 'Ready' }}</div>
        </div>

        <!-- Controls: Fixed to bottom of sidebar -->
        <div class="sidebar-controls">
            <button id="btn-roll" class="win-btn default-btn">{{ m.roll_dice or 'Roll Dice' }}</button>
            <button id="btn-end-turn" class="win-btn hidden">{{ m.end_turn or 'End Turn' }}</button>
        </div>
    </aside>

    <!-- MAIN GAME BOARD: Equivalent to VB mapa PictureBox -->
    <main id="game-viewport">
        <div id="game-board" class="win-inset">
            <!-- Tiles and Pawns rendered via metropoly.js -->
        </div>
    </main>
</div>

<!-- ===================== -->
<!-- WIN95 MODAL SYSTEM    -->
<!-- ===================== -->

<!-- 1. SALES SHOP (frmBuyDialog) -->
<div id="buy-modal" class="modal hidden">
    <!-- VB Style: Flat appearance, no Title bar, grey background -->
    <div class="win95-dialog win95-bevel-out buy-dialog-style">
        <div class="win-body">
            <p id="buy-question-text" class="vb-label-center">Label1</p>
            <div class="win-buttons-center">
                <button id="buy-yes-btn" class="win-btn">{{ 'Yes' }}</button>
                <button id="buy-no-btn" class="win-btn" onclick="closeBuyModal()">{{ 'No' }}</button>
            </div>
        </div>
    </div>
</div>

<!-- 2. ABOUT BOX (frmAbout) -->
<div id="about-modal" class="modal hidden">
    <div class="win95-dialog win95-bevel-out" style="width: 300px;">
        <div class="win-title-bar">
            <span>Metropoly</span>
            <button class="win-close" onclick="closeAbout()">✕</button>
        </div>
        <div class="win-body text-center">
            <img src="{{ url_for('metropoly.static', filename='assets/graphics/jail.png') }}">
            <p><strong>Metropoly</strong></p>
            <p>Version 1.0<br>32-bit Web Port</p>
            <button class="win-btn" onclick="closeAbout()" style="width: 80px; margin-top: 10px;">OK</button>
        </div>
    </div>
</div>



<script>window.INITIAL_STATE = {{ game|tojson }};</script>
<script src="{{ url_for('metropoly.static', filename='metropoly.js') }}"></script>

</body>
</html>
