<!-- THE MAP EDITOR TOOLBOX (Ported from VB FrameMapEditor) -->
<div id="map-editor-tools" class="modal hidden" style="justify-content: flex-start; background: none; pointer-events: none;">
    
    <div class="win95-dialog win95-bevel-out" style="width: 120px; margin-left: 10px; pointer-events: auto;">
        <div class="win-title-bar">
            <span>Tools</span>
        </div>
        
        <div class="win95-dialog-body" style="padding: 5px;">
            <!-- VB OptionButtons 0-4 as a vertical icon list -->
            <div class="editor-tool-grid">
                
                <div class="tool-item active" onclick="selectEditorTool(0, this)" title="Road">
                    <img src="/metropoly/static/assets/graphics/roadlr.png">
                    <span>Road</span>
                </div>
                
                <div class="tool-item" onclick="selectEditorTool(1, this)" title="Land">
                    <img src="/metropoly/static/assets/graphics/h0.png">
                    <span>Land</span>
                </div>
                
                <div class="tool-item" onclick="selectEditorTool(2, this)" title="School">
                    <img src="/metropoly/static/assets/graphics/school.png">
                    <span>School</span>
                </div>
                
                <div class="tool-item" onclick="selectEditorTool(3, this)" title="Job">
                    <img src="/metropoly/static/assets/graphics/job.png">
                    <span>Job</span>
                </div>
                
                <div class="tool-item" onclick="selectEditorTool(4, this)" title="Semafor">
                    <img src="/metropoly/static/assets/graphics/e1.png">
                    <span>Semafor</span>
                </div>

            </div>

            <hr class="win95-hr">
            <p style="font-size: 10px; text-align: center;">Click map to place</p>
        </div>
    </div>
</div>
